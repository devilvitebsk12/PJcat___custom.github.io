<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard RPG - Legends of A...</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #0f1b2e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header {
            background: #1e2a44;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        h1 {
            margin: 0;
            color: #ffd700;
            font-size: 2.2em;
        }
        .tabs {
            display: flex;
            background: #16213e;
        }
        .tab {
            padding: 15px 30px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            font-weight: bold;
        }
        .tab.active {
            background: #0f1b2e;
            border-bottom: 4px solid #ffd700;
            color: #ffd700;
        }
        .content {
            padding: 20px;
        }
        .top3 {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .top-card {
            background: #1e2a44;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            width: 180px;
        }
        .top1 { border: 3px solid #ffd700; transform: scale(1.08); }
        .top2 { border: 2px solid #c0c0c0; }
        .top3 { border: 2px solid #cd7f32; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #334455;
        }
        th {
            background: #1e2a44;
            color: #ffd700;
        }
        tr:hover {
            background: #1e2a44;
        }
        .update {
            text-align: right;
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Leaderboard RPG</h1>
            <p id="update-time">Última actualización: Cargando...</p>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Nivel</div>
            <div class="tab" onclick="switchTab(1)">Fama</div>
            <div class="tab" onclick="switchTab(2)">Poderes</div>
        </div>

        <div class="content">
            <div id="top3" class="top3"></div>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Posición</th>
                        <th>Personaje</th>
                        <th>Dueño</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentData = [];

        function loadLeaderboard() {
            fetch('leaderboard_export.json')
                .then(res => res.json())
                .then(data => {
                    currentData = data.leaderboard;
                    document.getElementById('update-time').textContent = 
                        `Última actualización: ${new Date(data.last_update).toLocaleString('es-ES')}`;
                    renderLeaderboard(0); // Mostrar por defecto Nivel
                })
                .catch(() => {
                    document.body.innerHTML += "<p style='color:red;text-align:center;'>Error: No se encontró leaderboard_export.json</p>";
                });
        }

        function renderLeaderboard(tab) {
            const tbody = document.querySelector('#leaderboard-table tbody');
            const top3Div = document.getElementById('top3');
            tbody.innerHTML = '';
            top3Div.innerHTML = '';

            // Top 3
            currentData.slice(0, 3).forEach((entry, i) => {
                const card = document.createElement('div');
                card.className = `top-card top${i+1}`;
                card.innerHTML = `
                    <h2>${entry.nombre}</h2>
                    <p><strong>${entry.dueño}</strong></p>
                    <p>${entry.extra || entry.nivel}</p>
                `;
                top3Div.appendChild(card);
            });

            // Resto
            currentData.forEach((entry, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${index + 1}</strong></td>
                    <td>${entry.nombre}</td>
                    <td>${entry.dueño}</td>
                    <td>${entry.extra || entry.nivel}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === tab);
            });
            renderLeaderboard(tab);
        }

        // Cargar al iniciar
        loadLeaderboard();
    </script>
</body>
</html>
